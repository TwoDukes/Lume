<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: monospace; }
  canvas { display: block; }
  #label {
    position: absolute;
    bottom: 12px;
    right: 16px;
    color: rgba(0,188,212,0.4);
    font-size: 11px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">live / lume lab</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PARTICLE_COUNT = 120;
const particles = [];

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 10;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = -(Math.random() * 0.6 + 0.2);
    this.life = 0;
    this.maxLife = 200 + Math.random() * 300;
    this.size = Math.random() * 2 + 0.5;
    this.hue = 180 + Math.random() * 60; // cyan-teal range
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life++;
    if (this.life > this.maxLife || this.y < -10) this.reset(false);
  }
  draw() {
    const t = this.life / this.maxLife;
    const alpha = t < 0.1 ? t * 10 : t > 0.8 ? (1 - t) * 5 : 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 90%, 70%, ${alpha * 0.7})`;
    ctx.fill();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

// Nodes
const NODE_COUNT = 7;
const nodes = Array.from({length: NODE_COUNT}, (_, i) => ({
  x: (canvas.width / (NODE_COUNT + 1)) * (i + 1),
  y: canvas.height * (0.3 + Math.random() * 0.4),
  r: 3 + Math.random() * 3,
  phase: Math.random() * Math.PI * 2,
  speed: 0.008 + Math.random() * 0.008,
}));

let pulseT = 0;
let activeEdge = 0;
let edgeT = 0;

function drawEdge(a, b, progress, alpha) {
  const x1 = a.x, y1 = a.y, x2 = b.x, y2 = b.y;
  const ex = x1 + (x2 - x1) * progress;
  const ey = y1 + (y2 - y1) * progress;
  const grad = ctx.createLinearGradient(x1, y1, ex, ey);
  grad.addColorStop(0, `rgba(0,188,212,${alpha * 0.15})`);
  grad.addColorStop(1, `rgba(0,188,212,${alpha * 0.6})`);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(ex, ey);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;
  ctx.stroke();
  // glowing tip
  ctx.beginPath();
  ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,220,230,${alpha * 0.9})`;
  ctx.fill();
}

function frame() {
  ctx.fillStyle = 'rgba(10,10,15,0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => { p.update(); p.draw(); });

  pulseT += 0.02;
  edgeT += 0.018;
  if (edgeT > 1) { edgeT = 0; activeEdge = (activeEdge + 1) % (NODE_COUNT - 1); }

  // Draw all base edges
  for (let i = 0; i < NODE_COUNT - 1; i++) {
    ctx.beginPath();
    ctx.moveTo(nodes[i].x, nodes[i].y);
    ctx.lineTo(nodes[i+1].x, nodes[i+1].y);
    ctx.strokeStyle = 'rgba(0,188,212,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Active edge animation
  drawEdge(nodes[activeEdge], nodes[activeEdge+1], Math.min(edgeT * 1.4, 1), 1);

  // Draw nodes
  nodes.forEach((n, i) => {
    n.y += Math.sin(pulseT * n.speed * 60 + n.phase) * 0.15;
    const pulse = 0.5 + 0.5 * Math.sin(pulseT * 2 + n.phase);
    // glow
    const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 4);
    grd.addColorStop(0, `rgba(0,188,212,${0.3 * pulse})`);
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r * 4, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    // core
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,220,230,${0.7 + 0.3 * pulse})`;
    ctx.fill();
  });

  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
