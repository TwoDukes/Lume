<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🔵 Cyan Labs</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #111720;
      --surface2: #161d28;
      --text: #e8edf3;
      --text2: #b0bcc8;
      --muted: #6b7a8a;
      --accent: #00BCD4;
      --accent2: #4dd8e8;
      --amber: #e8a04e;
      --green: #4ade80;
      --red: #f87171;
      --line: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; margin: 0; }
    body { background: var(--bg); color: var(--text); font: 15px/1.6 Inter, ui-sans-serif, system-ui, sans-serif; min-height: 100vh; padding: 24px; }
    a { color: inherit; text-decoration: none; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
    .header h1 { font-size: 22px; letter-spacing: -.02em; }
    .header h1 span { color: var(--accent); }
    .header-links { display: flex; gap: 8px; }
    .header-links a { padding: 6px 14px; border: 1px solid var(--line); border-radius: 999px; font-size: 13px; color: var(--muted); transition: color .15s, border-color .15s; }
    .header-links a:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

    .mono { font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }

    .section-label { margin-bottom: 12px; padding-top: 8px; }
    .section-label.starred { color: var(--amber); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; margin-bottom: 28px; }

    .card { border: 1px solid var(--line); background: var(--surface); padding: 18px; transition: border-color .15s; position: relative; }
    .card:hover { border-color: rgba(255,255,255,.15); }
    .card.starred-card { border-color: rgba(232,160,78,.2); }
    .card.starred-card:hover { border-color: rgba(232,160,78,.35); }
    .card.archived-card { opacity: .55; }
    .card.archived-card:hover { opacity: .75; }

    .card-top { display: flex; justify-content: space-between; align-items: start; gap: 8px; margin-bottom: 10px; }
    .card-top-left { display: flex; align-items: center; gap: 8px; }
    .card-emoji { font-size: 24px; }
    .card h3 { font-size: 17px; letter-spacing: -.02em; margin-bottom: 4px; }
    .card p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font: 10px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; text-transform: uppercase; letter-spacing: .08em; }
    .badge.shared { background: rgba(0,188,212,.12); color: var(--accent); border: 1px solid rgba(0,188,212,.25); }
    .badge.private { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--line); }
    .badge.star-badge { background: rgba(232,160,78,.12); color: var(--amber); border: 1px solid rgba(232,160,78,.25); }
    .badge.archived-badge { background: rgba(255,255,255,.03); color: var(--muted); border: 1px solid var(--line); }

    .card-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .btn-open { padding: 6px 14px; border: 1px solid var(--accent); border-radius: 999px; font-size: 12px; color: var(--accent); transition: all .15s; background: transparent; cursor: pointer; text-decoration: none; }
    .btn-open:hover { background: rgba(0,188,212,.1); color: var(--accent2); }

    .btn-sm { padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px; font: 10px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); background: transparent; cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: .06em; }
    .btn-sm:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
    .btn-sm.danger:hover { border-color: rgba(248,113,113,.4); color: var(--red); }
    .btn-sm.star:hover { border-color: rgba(232,160,78,.4); color: var(--amber); }
    .btn-sm.starred { border-color: rgba(232,160,78,.3); color: var(--amber); }
    .btn-sm.recover:hover { border-color: rgba(74,222,128,.4); color: var(--green); }

    /* Archive toggle */
    .archive-toggle { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 8px; padding: 10px 0; margin-bottom: 8px; border-top: 1px solid var(--line); }
    .archive-toggle .arrow { transition: transform .2s; display: inline-block; font-size: 11px; color: var(--muted); }
    .archive-toggle .arrow.open { transform: rotate(90deg); }
    .archive-toggle .count { font: 10px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 999px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--line); padding: 10px 20px; border-radius: 8px; font-size: 13px; color: var(--text2); opacity: 0; transition: transform .3s ease, opacity .3s ease; z-index: 100; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .confirm-box { background: var(--surface2); border: 1px solid var(--line); padding: 24px; max-width: 400px; width: 90%; }
    .confirm-box h3 { font-size: 17px; margin-bottom: 8px; }
    .confirm-box p { font-size: 14px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
    .confirm-box .warn { color: var(--red); }
    .confirm-box .actions { display: flex; gap: 10px; justify-content: flex-end; }
    .confirm-box .btn-cancel { padding: 8px 16px; border: 1px solid var(--line); border-radius: 999px; background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; }
    .confirm-box .btn-confirm { padding: 8px 16px; border: 1px solid rgba(248,113,113,.4); border-radius: 999px; background: rgba(248,113,113,.1); color: var(--red); cursor: pointer; font-size: 13px; }
    .confirm-box .btn-cancel:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
    .confirm-box .btn-confirm:hover { background: rgba(248,113,113,.2); }

    .empty { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>

  <header class="header">
    <h1>🔵 Cyan <span>Labs</span></h1>
    <div class="header-links"><a href="/">Canvas</a></div>
  </header>

  <div id="labContent"></div>
  <div class="toast" id="toast"></div>

  <script>
  (() => {
    const content = document.getElementById('labContent');
    const toastEl = document.getElementById('toast');
    let labs = [];
    let archiveOpen = false;
    let toastTimer;

    function showToast(msg) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
    }

    function renderActiveCard(lab, i, isStarred) {
      return `
        <article class="card${isStarred ? ' starred-card' : ''}">
          <div class="card-top">
            <div class="card-top-left"><div class="card-emoji">${lab.emoji || '🧪'}</div></div>
            <div class="badges">
              ${lab.starred ? '<span class="badge star-badge">★</span>' : ''}
              <span class="badge ${lab.shared ? 'shared' : 'private'}">${lab.shared ? 'Shared' : 'Private'}</span>
            </div>
          </div>
          <h3>${lab.name}</h3>
          <p>${lab.description}</p>
          <div class="card-actions">
            <a class="btn-open" href="/lab/${lab.file}" target="_blank">Open →</a>
            <button class="btn-sm" data-action="toggle" data-idx="${i}">${lab.shared ? 'Private' : 'Share'}</button>
            <button class="btn-sm star${lab.starred ? ' starred' : ''}" data-action="star" data-idx="${i}">${lab.starred ? '★ Unstar' : '☆ Star'}</button>
            ${lab.shared ? `<button class="btn-sm" data-action="copy" data-idx="${i}">Copy Link</button>` : ''}
            <button class="btn-sm" data-action="archive" data-idx="${i}">Archive</button>
          </div>
        </article>`;
    }

    function renderArchivedCard(lab, i) {
      return `
        <article class="card archived-card">
          <div class="card-top">
            <div class="card-top-left"><div class="card-emoji">${lab.emoji || '🧪'}</div></div>
            <div class="badges"><span class="badge archived-badge">Archived</span></div>
          </div>
          <h3>${lab.name}</h3>
          <p>${lab.description}</p>
          <div class="card-actions">
            <a class="btn-open" href="/lab/${lab.file}" target="_blank" style="opacity:.5">Open →</a>
            <button class="btn-sm recover" data-action="recover" data-idx="${i}">↩ Recover</button>
            <button class="btn-sm danger" data-action="permadelete" data-idx="${i}">Delete Forever</button>
          </div>
        </article>`;
    }

    function render() {
      if (!labs.length) {
        content.innerHTML = '<div class="grid"><div class="empty">No labs found.</div></div>';
        return;
      }

      const active = labs.map((l, i) => ({ lab: l, idx: i })).filter(x => !x.lab.archived);
      const archived = labs.map((l, i) => ({ lab: l, idx: i })).filter(x => x.lab.archived);
      const starred = active.filter(x => x.lab.starred);
      const unstarred = active.filter(x => !x.lab.starred);

      let html = '';

      if (starred.length) {
        html += '<div class="section-label mono starred">★ Starred</div>';
        html += '<div class="grid">';
        html += starred.map(x => renderActiveCard(x.lab, x.idx, true)).join('');
        html += '</div>';
      }

      if (unstarred.length) {
        if (starred.length) html += '<div class="section-label mono">All Labs</div>';
        html += '<div class="grid">';
        html += unstarred.map(x => renderActiveCard(x.lab, x.idx, false)).join('');
        html += '</div>';
      }

      if (archived.length) {
        html += `<div class="archive-toggle" id="archiveToggle">
          <span class="arrow${archiveOpen ? ' open' : ''}">▶</span>
          <span class="mono">Archived</span>
          <span class="count">${archived.length}</span>
        </div>`;
        if (archiveOpen) {
          html += '<div class="grid">';
          html += archived.map(x => renderArchivedCard(x.lab, x.idx)).join('');
          html += '</div>';
        }
      }

      content.innerHTML = html;

      // Archive toggle
      const toggle = document.getElementById('archiveToggle');
      if (toggle) toggle.addEventListener('click', () => { archiveOpen = !archiveOpen; render(); });

      // Wire buttons
      content.querySelectorAll('.btn-sm[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          const action = btn.dataset.action;
          if (action === 'toggle') toggleVisibility(idx);
          else if (action === 'star') toggleStar(idx);
          else if (action === 'copy') copyLink(idx);
          else if (action === 'archive') archiveLab(idx);
          else if (action === 'recover') recoverLab(idx);
          else if (action === 'permadelete') confirmPermaDelete(idx);
        });
      });
    }

    async function save() {
      try {
        const resp = await fetch('/api/labs', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(labs, null, 2),
        });
        return resp.ok;
      } catch { return false; }
    }

    async function toggleVisibility(idx) {
      labs[idx].shared = !labs[idx].shared;
      if (await save()) { showToast(`${labs[idx].name}: ${labs[idx].shared ? 'Shared' : 'Private'}`); }
      else { labs[idx].shared = !labs[idx].shared; showToast('Save failed'); }
      render();
    }

    async function toggleStar(idx) {
      labs[idx].starred = !labs[idx].starred;
      if (await save()) { showToast(`${labs[idx].name}: ${labs[idx].starred ? 'Starred' : 'Unstarred'}`); }
      else { labs[idx].starred = !labs[idx].starred; showToast('Save failed'); }
      render();
    }

    function copyLink(idx) {
      const url = `${window.location.origin}/lab/${labs[idx].file}`;
      navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => showToast('Could not copy'));
    }

    async function archiveLab(idx) {
      labs[idx].archived = true;
      labs[idx].shared = false; // archived = always private
      labs[idx].starred = false;
      if (await save()) { showToast(`Archived: ${labs[idx].name}`); }
      else { labs[idx].archived = false; showToast('Save failed'); }
      render();
    }

    async function recoverLab(idx) {
      labs[idx].archived = false;
      if (await save()) { showToast(`Recovered: ${labs[idx].name}`); }
      else { labs[idx].archived = true; showToast('Save failed'); }
      render();
    }

    function confirmPermaDelete(idx) {
      const lab = labs[idx];
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `
        <div class="confirm-box">
          <h3>Permanently delete "${lab.name}"?</h3>
          <p>This will <span class="warn">remove the lab from the index AND delete the file from disk</span>. This cannot be undone.</p>
          <div class="actions">
            <button class="btn-cancel">Cancel</button>
            <button class="btn-confirm">Delete Forever</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      overlay.querySelector('.btn-cancel').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('.btn-confirm').addEventListener('click', async () => {
        overlay.remove();
        const name = lab.name;
        const file = lab.file;
        labs.splice(idx, 1);
        if (await save()) {
          // Also delete file from disk
          try {
            await fetch(`/api/labs/file/${encodeURIComponent(file)}`, {
              method: 'DELETE',
              credentials: 'include',
            });
          } catch {}
          showToast(`Permanently deleted: ${name}`);
        } else {
          showToast('Delete failed');
        }
        render();
      });
    }

    // Load
    fetch('/api/labs', { credentials: 'include' })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => { labs = Array.isArray(data) ? data : []; render(); })
      .catch(() => {
        fetch('/lab/labs.json', { credentials: 'include' }).then(r => r.json())
          .then(data => { labs = data; render(); })
          .catch(() => { content.innerHTML = '<div class="grid"><div class="empty">Could not load labs.</div></div>'; });
      });
  })();
  </script>

</body>
</html>
