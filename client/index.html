<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Lume</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <h1>LUME</h1>
  <div class="header-right">
    <a href="/lab/" class="labs-link" title="Labs">⚗ LABS</a>
    <span class="badge connecting" id="status">CONNECTING</span>
    <span class="clock" id="clock"></span>
  </div>
</div>

<div class="grid">

  <!-- HISTORY (left, full height) -->
  <div class="panel panel-feed panel-collapsed">
    <div class="panel-header" onclick="togglePanel('feed')">
      <span class="panel-toggle collapsed" id="feed-toggle">&#9660;</span>
      HISTORY
      <span class="count" id="history-count">0</span>
    </div>
    <div class="panel-body" id="history-list">
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        No snapshots yet
      </div>
    </div>
  </div>

  <!-- Right column -->
  <div class="right-col">

    <!-- CANVAS / LAB (bottom-right, larger) -->
    <div class="panel panel-canvas">
      <div class="panel-header">
        <span>Canvas</span><span id="canvas-slug-label" class="canvas-slug-label"></span>
        <div class="canvas-header-actions">
          <button id="share-btn" onclick="event.stopPropagation(); shareCanvas()" title="Copy share link">🔗 Share</button>

        </div>
      </div>
      <div class="panel-body">
        <div class="canvas-content" id="canvas-content">
          <div class="empty-state">
            <div class="empty-state-icon">&#9634;</div>
            Nothing here yet
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="/config.js"></script>
  <script src="app.js"></script>
<div id="toast-container"></div>
</body>
</html>
